<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindMe! | Publicar producto</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="global.css">
</head>
<body>
  <header class="topbar">
    <div class="brand"><div class="brand-badge"><i class="fa-solid fa-store"></i></div><div>FindMe!</div></div>
    <div class="topbar-inner">
      <div class="searchbar"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Buscar..."></div>
      <button class="location-chip"><i class="fa-solid fa-map-pin"></i> Ciudad López Mateos</button>
      <button class="pill-btn primary"><i class="fa-solid fa-plus"></i><span>Publicar</span></button>
      <img class="avatar" src="https://i.pravatar.cc/150?img=12" alt="Perfil">
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="section">
        <h4>Navegación</h4>
        <a class="nav-item" href="index.html"><i class="fa-solid fa-house"></i>Inicio</a>
        <a class="nav-item" href="chat.html"><i class="fa-regular fa-message"></i>Mensajes</a>
        <a class="nav-item active" href="productos.html"><i class="fa-solid fa-box"></i>Mis publicaciones</a>
      </div>
    </aside>

    <main class="main">
      <div class="form-shell">
        <div class="form-top">
          <div class="progress-wrap"><div class="step-label"><span>Paso 1 de 1: Detalles del anuncio</span></div><div class="progress"><div class="progress-bar" style="width:100%"></div></div></div>
          <button class="pill-btn" type="button" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i><span>Volver</span></button>
        </div>
        <div class="content-publish">
          <div class="title" style="margin-bottom:20px;">
            <h1 style="font-size:28px;">Publicar nuevo artículo</h1>
            <p style="color:var(--muted)">Atrae a compradores cercanos con buenas fotos y detalles claros.</p>
          </div>
          <div class="publish-grid">
            <div class="panel-publish">
              <div class="panel-header"><h3>Fotos del producto</h3><span>Máximo 5</span></div>
              <div class="dropzone-publish" onclick="showToast('Abriendo explorador de archivos...', 'fa-solid fa-folder-open')">
                <i class="fa-solid fa-cloud-arrow-up" style="font-size: 48px; color: var(--blue);"></i>
                <p>Haz clic para explorar</p>
              </div>
            </div>
            <div class="panel-publish">
              <div class="panel-header"><h3>Detalles</h3></div>
              <div class="field-publish"><label>Título</label><input type="text" id="title" placeholder="Ej. 'Silla Gamer casi nueva'"></div>
              <div class="field-publish"><label>Categoría</label><select id="category"><option>Tecnología</option><option>Hogar</option></select></div>
              <div class="field-publish"><label>Precio</label><div class="price-input-group"><span>$</span><input type="number" id="price" placeholder="0"></div></div>
              <div class="field-publish"><label>Descripción</label><textarea id="description" rows="3"></textarea></div>
            </div>
          </div>
          <div class="floating-actions">
            <button type="button" class="secondary-btn" onclick="showToast('Borrador guardado', 'fa-solid fa-bookmark')"><i class="fa-regular fa-bookmark"></i> Guardar borrador</button>
            <button type="button" class="primary-btn" id="publishBtn"><i class="fa-solid fa-paper-plane"></i> Publicar anuncio</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script>
    function showToast(message, iconClass = 'fa-solid fa-check-circle') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div'); toast.className = 'toast';
      toast.innerHTML = `<i class="${iconClass}"></i> <span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 300); }, 3000);
    }
    document.getElementById('publishBtn').addEventListener('click', () => { 
      showToast('¡Producto publicado con éxito!', 'fa-solid fa-rocket'); 
      setTimeout(() => window.location.href='index.html', 1500);
    });
  </script>
</body>
</html>
