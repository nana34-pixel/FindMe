<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindMe! | Crear cuenta</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="global.css">
  <style>body { background: var(--bg); }</style>
</head>
<body>
<div class="login-page">
  <div class="register-container">
    <div class="register-left">
      <div class="logo"><div class="logo-icon"><i class="fa-solid fa-location-dot"></i></div><h1>FindMe!</h1></div>
      <h2>Únete a la comunidad</h2>
      <p>Regístrate para comprar y vender cerca de ti. Es rápido, seguro y gratuito.</p>
    </div>
    <div class="register-right">
      <div class="register-card">
        <h3>Crear cuenta</h3>
        <p class="sub">Completa tus datos para empezar</p>
        <form id="registerForm">
          <div class="register-grid">
            <div>
              <div class="input-group"><label>Nombre completo</label><input type="text" id="fullName" required /></div>
              <div class="input-group"><label>Correo</label><input type="email" id="emailReg" required /></div>
              <div class="input-group"><label>Contraseña</label><div class="password-wrapper"><input type="password" id="passReg" required /><button type="button" class="toggle-pwd" onclick="togglePassword('passReg', this)"><i class="fa-regular fa-eye"></i></button></div></div>
            </div>
            <div class="location-card-reg">
              <label>Ubicación principal</label>
              <div class="map-mini"><div class="pin-mock"><i class="fa-solid fa-location-dot"></i></div></div>
              <input type="text" placeholder="Código postal o colonia" id="locationReg" class="input-group" style="width:100%; margin-top:12px;" />
              <button type="button" class="location-btn-reg" id="useLocationBtn"><i class="fa-solid fa-location-crosshairs"></i> Usar mi ubicación</button>
            </div>
          </div>
          <div class="terms-check"><input type="checkbox" id="terms" required /> <label>Acepto los términos</label></div>
          <button type="submit" class="register-btn">Registrarme</button>
        </form>
        <div class="login-link" style="margin-top:20px;">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></div>
      </div>
    </div>
  </div>
</div>
<div id="toastContainer" class="toast-container"></div>
<script>
  function showToast(message, iconClass = 'fa-solid fa-check-circle') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div'); toast.className = 'toast';
    toast.innerHTML = `<i class="${iconClass}"></i> <span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 300); }, 3000);
  }
  function togglePassword(id, btn) { const inp = document.getElementById(id); if(inp.type === 'password') { inp.type='text'; btn.innerHTML='<i class="fa-regular fa-eye-slash"></i>'; } else { inp.type='password'; btn.innerHTML='<i class="fa-regular fa-eye"></i>'; } }
  document.getElementById('useLocationBtn').addEventListener('click', () => { document.getElementById('locationReg').value = 'Ciudad López Mateos'; showToast('Ubicación capturada: Ciudad López Mateos', 'fa-solid fa-map-pin'); });
  document.getElementById('registerForm').addEventListener('submit', (e) => { 
    e.preventDefault(); 
    if(!document.getElementById('terms').checked) { showToast('Acepta los términos', 'fa-solid fa-circle-exclamation'); return; } 
    showToast('Registro exitoso. Redirigiendo...', 'fa-solid fa-rocket'); 
    setTimeout(() => window.location.href = 'index.html', 1500); 
  });
</script>
</body>
</html>
