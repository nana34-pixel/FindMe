<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindMe! | Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="global.css">
  <style>body { background: var(--bg); }</style>
</head>
<body>
<div class="login-page">
  <div class="login-container">
    <div class="login-left">
      <div class="logo"><div class="logo-icon"><i class="fa-solid fa-location-dot"></i></div><h1>FindMe!</h1></div>
      <h2>Bienvenido de vuelta</h2>
      <p>Accede a tu cuenta para seguir comprando y vendiendo cerca de ti.</p>
    </div>
    <div class="login-right">
      <div class="login-card">
        <h3>Iniciar sesión</h3>
        <p class="sub">Ingresa tus datos para continuar</p>
        <form id="loginForm">
          <div class="input-group"><label>Correo electrónico</label><input type="email" id="loginEmail" placeholder="tú@ejemplo.com" required /></div>
          <div class="input-group"><label>Contraseña</label><div class="password-wrapper"><input type="password" id="loginPassword" required /><button type="button" class="toggle-pwd" onclick="togglePasswordVisibility('loginPassword', this)"><i class="fa-regular fa-eye"></i></button></div></div>
          <div class="forgot-link"><a href="#">¿Olvidaste tu contraseña?</a></div>
          <button type="submit" class="login-btn">Ingresar</button>
        </form>
        <div class="divider">O continúa con</div>
        <div class="social-login"><button class="social-btn"><i class="fa-brands fa-google"></i> Google</button></div>
        <div class="register-link">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></div>
      </div>
    </div>
  </div>
</div>
<div id="toastContainer" class="toast-container"></div>
<script>
  function showToast(message, iconClass = 'fa-solid fa-check-circle') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div'); toast.className = 'toast';
    toast.innerHTML = `<i class="${iconClass}"></i> <span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 300); }, 3000);
  }
  function togglePasswordVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') { input.type = 'text'; btn.innerHTML = '<i class="fa-regular fa-eye-slash"></i>'; }
    else { input.type = 'password'; btn.innerHTML = '<i class="fa-regular fa-eye"></i>'; }
  }
  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    showToast('Iniciando sesión...', 'fa-solid fa-spinner');
    setTimeout(() => window.location.href = 'index.html', 1500);
  });
</script>
</body>
</html>
