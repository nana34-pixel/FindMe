<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - FindMe</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="register-body">

<div class="register-card">

  <div class="progress-bar">
    <div class="progress"></div>
  </div>

  <span>Paso 1 de 2: Tus datos</span>

  <h1>Únete a tu comunidad</h1>

  <p>Empieza a comprar y vender de forma local y segura</p>

  <div class="register-grid">

    <div>

      <input type="text" placeholder="Nombre completo">
      <input type="email" placeholder="Correo electrónico">
      <input type="password" placeholder="Contraseña">
      <input type="password" placeholder="Confirmar contraseña">

    </div>

    <div>

      <button class="gps-btn">
        <i class="fa-solid fa-location-crosshairs"></i>
        Usar mi ubicación actual
      </button>

      <input type="text" placeholder="Código Postal / Colonia">

      <div class="map-preview">
        Zona detectada
      </div>

    </div>

  </div>

  <label class="checkbox">
    <input type="checkbox">
    Acepto los términos y condiciones
  </label>

  <button class="register-btn">
    Crear cuenta
  </button>

</div>

</body>
</html>
