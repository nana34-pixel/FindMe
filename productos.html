<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - FindMe</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="chat-layout">

  <div class="chat-list">

    <input type="text" placeholder="Buscar en mis mensajes...">

    <div class="chat-item active-chat">

      <img src="img/user.jpg">

      <div>

        <h4>Rolando S.</h4>

        <p>Silla Gamer</p>

      </div>

      <span class="badge">
        1 nuevo
      </span>

    </div>

  </div>

  <div class="chat-window">

    <div class="chat-header">

      <div class="chat-user">

        <img src="img/user.jpg" class="chat-avatar">

        <div>

          <h3>Rolando S.</h3>

          <span class="online-status">
            ● En línea
          </span>

        </div>

      </div>

      <div class="chat-actions">

        <button class="icon-btn">
          📞
        </button>

        <button class="icon-btn">
          🛡️
        </button>

        <button class="report-btn small-report">
          🚩 Reportar
        </button>

      </div>

    </div>

    <div class="messages">

      <div class="message seller-message">
        Hola, sí sigue disponible.
      </div>

      <div class="message own-message">
        Perfecto, ¿podemos vernos hoy?
      </div>

    </div>

    <div class="chat-input">

      <button class="quick-chip">
        ¿Sigue disponible?
      </button>

      <button class="quick-chip">
        Te ofrezco $800
      </button>

      <div class="input-row">

        <input type="text" placeholder="Escribe un mensaje...">

        <button class="send-btn">
          ➤
        </button>

      </div>

    </div>

  </div>

</div>

<div class="chatbot">

  <div class="online-dot"></div>

  🤖 Chatbot

</div>

</body>
</html>
