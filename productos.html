<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Producto</title>

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/product.css">

</head>
<body>

<header class="top-header">

    <div class="logo">FindMe!</div>

    <div class="search-bar">
        🔍
        <input type="text" placeholder="Buscar productos...">
    </div>

</header>

<div class="product-layout">

    <div class="left-side">

        <img
        id="mainImage"
        class="main-product-image"
        src="https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?q=80&w=1200&auto=format&fit=crop">

        <div class="gallery-row">

            <img
            class="gallery-thumb active-thumb"
            src="https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?q=80&w=1200&auto=format&fit=crop">

            <img
            class="gallery-thumb"
            src="https://images.unsplash.com/photo-1517336714739-489689fd1ca8?q=80&w=1200&auto=format&fit=crop">

        </div>

        <h1>Monitor Curvo 27 pulgadas</h1>

        <div class="tag-row">

            <div class="chip">
                Usado - Como nuevo
            </div>

            <div class="chip">
                Tecnología
            </div>

            <div class="chip">
                Hace 2 horas
            </div>

        </div>

        <div class="description card">

            <h3>Descripción</h3>

            <ul>
                <li>144Hz</li>
                <li>Resolución 2K</li>
                <li>Excelente estado</li>
            </ul>

        </div>

        <div class="map-section card">
            <div class="map-zone"></div>
        </div>

    </div>

    <div class="right-side">

        <div class="sticky-card card">

            <h2>$2,500</h2>

            <div class="distance-label">
                📍 A 2.5 km de ti
            </div>

            <button class="main-btn action-btn">
                Enviar Mensaje
            </button>

            <button class="outline-btn action-btn">
                Hacer Oferta
            </button>

            <button class="favorite-action">
                ♡ Guardar en favoritos
            </button>

            <button class="report-btn">
                🚨 Reportar vendedor
            </button>

            <div class="seller-card">

                <img class="avatar" src="https://i.pravatar.cc/100">

                <div>
                    <h4>Rolando S.</h4>
                    <p>⭐ 4.9 • 15 ventas concretadas</p>
                </div>

            </div>

        </div>

    </div>

</div>

<div class="chatbot">

    <div class="online-dot"></div>

    🤖 Chatbot

</div>

<script src="js/product.js"></script>

</body>
</html>
