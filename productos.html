<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto - FindMe</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="product-layout">

  <div class="product-gallery">

    <img src="img/product1.jpg" class="main-product-image">

    <div class="thumbs">

      <img src="img/product1.jpg">
      <img src="img/product2.jpg">
      <img src="img/product3.jpg">
      <img src="img/product4.jpg">

    </div>

    <h1>Monitor Curvo 27 pulgadas</h1>

    <div class="product-chips">

      <span>Usado - Como nuevo</span>
      <span>Tecnología</span>
      <span>Hace 2 horas</span>

    </div>

    <div class="description">

      <h3>Descripción</h3>

      <ul>

        <li>Monitor 144Hz</li>
        <li>Excelente estado</li>
        <li>Incluye cables</li>

      </ul>

    </div>

  </div>

  <div class="sticky-card">

    <h1 class="product-price">$2,500</h1>

    <div class="distance-tag">
      📍 A 2.5 km de ti
    </div>

    <button class="primary-btn">
      Enviar Mensaje
    </button>

    <button class="secondary-btn">
      Hacer Oferta
    </button>

    <button class="favorite-btn">
      ❤️ Guardar en favoritos
    </button>

    <button class="report-btn">
      🚩 Reportar usuario
    </button>

    <div class="seller-card">

      <img src="img/user.jpg" class="seller-avatar">

      <div>
        <h4>Rolando S.</h4>
        <p>⭐ 4.9/5 • 15 ventas concretadas</p>
      </div>

      <button class="mini-btn">
        Ver perfil
      </button>

    </div>

  </div>

</div>

<div class="chatbot">

  <div class="online-dot"></div>

  🤖 Chatbot

</div>

</body>
</html>
